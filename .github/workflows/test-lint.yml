name: Test and Lint

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string

# Until backend code lands in R7 (Isaac) this repo is a minimal plugin
# stub — there's nothing to test beyond "the package still imports".
# Heavy GPU CI is tracked separately in R10. The job ID (`test-lint`)
# and display name (`Test and Lint`) are preserved so the required-check
# rule on `main` continues to match.
jobs:
  test-lint:
    name: Test and Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir --upgrade pip "virtualenv<21" hatch

      - name: Run lint
        run: hatch run lint

      - name: Run import smoke
        run: hatch run test
