name: Test and Lint

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string

# Until the Isaac backend code lands (R7) this repo is a minimal plugin
# stub — there's nothing to test beyond "the package still imports".
# Heavy GPU CI is tracked separately in R10. The job ID
# (`test-lint`) and display name (`Test and Lint`) are preserved so the
# required-check rule on `main` continues to match.
jobs:
  test-lint:
    name: Test and Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir --upgrade pip "virtualenv==20.29.3" hatch

      - name: Run lint
        run: hatch run lint

      - name: Run import smoke
        run: hatch run test
