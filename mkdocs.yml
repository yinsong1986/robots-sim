site_name: Strands Robots Sim
site_url: https://strands-labs.github.io/robots-sim
site_description: "GPU-accelerated NVIDIA Isaac Sim backend for strands-robots"
repo_url: https://github.com/strands-labs/robots-sim
repo_name: strands-labs/robots-sim
extra_css:
- stylesheets/extra.css?v=2
extra_javascript:
- https://unpkg.com/mermaid@10/dist/mermaid.min.js
- assets/mermaid-init.js
nav:
- Home: index.md
- Getting Started:
  - Installation: getting-started/installation.md
  - Quickstart: getting-started/quickstart.md
- Architecture: architecture.md
- Simulation:
  - Overview: simulation/overview.md
  - World Building: simulation/world-building.md
  - Domain Randomization: simulation/domain-randomization.md
- Backends:
  - Isaac Sim: backends/isaac.md
- Examples:
  - Overview: examples/overview.md
- API Reference: api-reference.md
- Troubleshooting: troubleshooting.md
- Contributing: contributing.md
- Security: security.md
theme:
  name: material
  logo: assets/strands-logo.svg
  favicon: assets/strands-logo.svg
  palette:
    - scheme: default
      primary: white
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
  - navigation.sections
  - navigation.expand
  - navigation.indexes
  - toc.follow
  - content.code.copy
  - content.tabs.link
  - navigation.top
  - navigation.tracking
markdown_extensions:
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.inlinehilite
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format ''
- pymdownx.tabbed:
    alternate_style: true
- admonition
- pymdownx.details
- pymdownx.betterem
- pymdownx.mark
- pymdownx.caret
- pymdownx.tilde
- pymdownx.keys
- pymdownx.tasklist:
    custom_checkbox: true
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji ''
    emoji_generator: !!python/name:material.extensions.emoji.to_svg ''
- attr_list
- md_in_html
- tables
- toc:
    permalink: true
