[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "strands-robots-sim"
dynamic = ["version"]
description = "Heavy NVIDIA simulation backends (Isaac Sim, Newton) for strands-robots"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "Apache-2.0"}
authors = [
    {name = "AWS", email = "opensource@amazon.com"},
]
keywords = ["robots", "agents", "isaac-sim", "newton", "warp", "libero", "strands", "sdk"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

# NOTE: heavy runtime deps (lerobot / torch / opencv-python-headless / pyzmq /
# msgpack) were dropped in 0.2.0 — those are pulled in transitively via
# `strands-robots` once the heavy backends land in R6+. The tiny default set
# below is what the no-op stub itself uses.
dependencies = [
    "strands-agents",
    "numpy>=1.21.0",
    "Pillow>=8.0.0",
]

[project.optional-dependencies]
dev = [
    "black",
    "isort",
    "flake8",
]
# NOTE: the lightweight `sim` extra (libero / robosuite / mujoco / gymnasium)
# was removed in 0.2.0 — that backend now lives in `strands-robots` and is
# installed via `pip install 'strands-robots[sim-mujoco]'`. Heavy GPU-only
# backends (Isaac Sim, Newton) will land here behind `[isaac]` / `[newton]`
# extras in upcoming releases. See examples/MIGRATION.md and
# https://github.com/strands-labs/robots-sim/issues/8.

[project.urls]
Homepage = "https://github.com/strands-labs/robots-sim"
Documentation = "https://github.com/strands-labs/robots-sim#readme"
Repository = "https://github.com/strands-labs/robots-sim.git"
Issues = "https://github.com/strands-labs/robots-sim/issues"

[tool.hatch.metadata]

[tool.hatch.version]
source = "vcs"

[tool.hatch.build.targets.wheel]
packages = ["strands_robots_sim"]

[tool.hatch.envs.default]
dependencies = [
    "black",
    "isort",
    "flake8",
]

[tool.hatch.envs.default.scripts]
# No tests until backend code lands in R7 (Isaac) / R11 (Newton). For now
# `hatch run test` is an import smoke that exercises the no-op stub.
test = "python -c \"import strands_robots_sim; print('strands-robots-sim', strands_robots_sim.__version__, 'OK')\""
lint = [
    "black --check strands_robots_sim",
    "isort --check-only strands_robots_sim",
    "flake8 strands_robots_sim",
]
format = [
    "black strands_robots_sim",
    "isort strands_robots_sim",
]

[tool.black]
line-length = 120
target-version = ['py310']
include = '\.pyi?$'

[tool.isort]
profile = "black"
line_length = 120
multi_line_output = 3
